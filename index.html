<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirror C.C.</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        color: #fff;
        font-family: system-ui, sans-serif;
      }
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      #webcam,
      #overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }
      #overlay {
        pointer-events: none;
      }
      #hud {
        position: absolute;
        right: 12px;
        bottom: 12px;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 6px;
        font-size: 13px;
        line-height: 1.4;
        display: flex;
        flex-direction: column;
        gap: 2px;
        pointer-events: none;
        font-variant-numeric: tabular-nums;
      }
      #status {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: rgba(0, 0, 0, 0.85);
        text-align: center;
        padding: 24px;
      }
      #status[data-state="ok"] {
        display: none;
      }
      #status-message {
        margin: 0;
        font-size: 18px;
      }
      #status-retry {
        padding: 10px 20px;
        font-size: 14px;
        background: #44aaff;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      #status-retry[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="hud" hidden>
        <span id="hud-fps">FPS: —</span>
        <span id="hud-detect">detect: — ms</span>
      </div>
      <div id="status" data-state="loading">
        <p id="status-message">カメラとモデルを準備しています…</p>
        <button id="status-retry" hidden>再試行</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
