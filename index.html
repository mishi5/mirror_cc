<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirror C.C.</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        color: #fff;
        font-family: system-ui, sans-serif;
      }
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /*
       * webcam の自然 aspect 比に従って viewport 内に最大収まる矩形を表示する。
       * --webcam-aspect は webcam attach 後に JS で webcam.videoWidth/videoHeight から
       * セットされる (デフォルトは 4:3 ≈ 1.3333)。
       * canvas は CSS の object-fit を使えないため、stage を介して video と完全に
       * 同じ表示領域に重ねる。
       */
      #webcam-stage {
        position: relative;
        width: min(100vw, calc(100vh * var(--webcam-aspect, 1.3333)));
        height: min(100vh, calc(100vw / var(--webcam-aspect, 1.3333)));
      }
      #webcam,
      #overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        transform: scaleX(-1);
      }
      #overlay {
        pointer-events: none;
      }
      #hud {
        position: absolute;
        /* 左寄せ固定: 数値の桁数が変わっても左端が動かず読みやすい */
        left: 12px;
        bottom: 12px;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 6px;
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        text-shadow: 0 0 3px #000;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        pointer-events: none;
        /* 等幅 + tabular-nums で桁ぶれによる横揺れを抑制 */
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-variant-numeric: tabular-nums;
        white-space: pre;
        min-width: 360px;
      }
      #status {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: rgba(0, 0, 0, 0.85);
        text-align: center;
        padding: 24px;
      }
      #status[data-state="ok"] {
        display: none;
      }
      #status-message {
        margin: 0;
        font-size: 18px;
      }
      #status-retry {
        padding: 10px 20px;
        font-size: 14px;
        background: #44aaff;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      #status-retry[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="webcam-stage">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
      </div>
      <div id="hud" hidden>
        <span id="hud-fps">FPS: —</span>
        <span id="hud-detect">detect: — ms</span>
        <span id="hud-action">action: —</span>
        <span id="hud-scores">C — / G — / A —</span>
        <span id="hud-details">C — | G — | A —</span>
        <span id="hud-vis">vis —</span>
      </div>
      <div id="status" data-state="loading">
        <p id="status-message">カメラとモデルを準備しています…</p>
        <button id="status-retry" hidden>再試行</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
